[pytest]
; All suites live under one root tests/ (nested by area):
;   tests/greedy/             the greedy pipeline suite (+ conftest.py at tests/)
;   tests/equivalence_classes/ the 261-reps suite (test_equivalence.py)
;   tests/stable_ac/          the per-pipeline harness tests (nocov, cov, ak3)
;   tests/wandb_tracking/              the wandb_tracking suite
; A bare `pytest` collects all of them. The test SUPPORT code they import
; (experiments/greedy_tests/spec, fixtures, adapters, tools, golden) stays under
; experiments/ because production modules import it too -- do not move it.
testpaths = tests
; Repo root on sys.path so tests resolve `import experiments...` under any
; invocation (bare `pytest` or `python -m pytest`, any CWD).
pythonpath = .
; No -q here: the documented command already passes it, and -q twice is -qq,
; which suppresses the final "N passed" summary line.
addopts = --basetemp=.pytest_tmp
markers =
    slow: long-running; run with --runslow before any push or result claim
    mp: spawns real worker processes
    wandb: requires the wandb package
    stable: forward-compat coverage for stable AC moves (n_gen >= 3)
filterwarnings =
    ignore::DeprecationWarning
