[pytest]
; tests/ holds the wandb_tracking suite; experiments/greedy_tests/ holds the
; greedy pipeline suite; experiments/equivalence_classes/ holds the 261-reps suite
; (its own test_equivalence.py); experiments/stable_ac/ holds the per-pipeline
; harness tests colocated with each pipeline (nocov/test_run_nocov.py,
; cov/test_cov.py). A bare `pytest` must collect all of them -- the equivalence
; suite was omitted here for a while, so nothing ran it by default and a change
; to that subsystem could break it silently.
testpaths = experiments/greedy_tests experiments/equivalence_classes experiments/stable_ac tests
; No -q here: the documented command already passes it, and -q twice is -qq,
; which suppresses the final "N passed" summary line.
addopts = --basetemp=.pytest_tmp
markers =
    slow: long-running; run with --runslow before any push or result claim
    mp: spawns real worker processes
    wandb: requires the wandb package
    stable: forward-compat coverage for stable AC moves (n_gen >= 3)
filterwarnings =
    ignore::DeprecationWarning
