# Production config for the Track T2 static rank-4/5 stabilization sweep
# (experiments/stable_ac/nocov/run_static_rank.py). Intended runner: Colab via
# experiments/stable_ac/nocov/static_rank.ipynb (so MOUNT_DRIVE and USE_WANDB are
# ON here). LOCAL runs must keep every budget <= 1000 nodes — run_static_rank
# refuses a bigger budget unless ACSOLVERX_ALLOW_BIG=1 is set (the notebook RUN
# cell sets it on Colab).
# Keys mirror run_static_rank.DEFAULT_CONFIG; values match it EXCEPT the
# documented production deltas: MOUNT_DRIVE, USE_WANDB, HIGH_SPEEDUP, BUDGET (all
# pinned by test_config_yaml_round_trips_with_default_config).

BENCHMARK: combined_11        # 10 ladder + 1 reach (AK(3)) rows — the T2 secondary deliverable
FAMILIES: [A1]                # word POOL families; A1 = 16 curated |w|<=4 words in F(x,y)
RANKS: [4, 5]                 # one jsonl per (budget, family, rank)
MODE: static_rank             # row tag; the filename stem is the "staticrank" code constant
BUDGET: [10000]               # node budget per search, one sweep per entry; local <= 1000.
MAX_RELATOR_LENGTH: 64        # per-relator cap (search_n cap=; NO total-length budget)
CYCLIC_REDUCE: true           # cyclically reduce after each move (matches the baseline)
HIGH_SPEEDUP: true            # search_n_fast: same search, fused numba bookkeeping, ~5x
                              # faster; every row field bit-identical. Result-neutral ->
                              # NOT in the filename identity; files resume across modes.

A1_WORDS: null                # null -> word_families.A1_DEFAULT_WORDS
A2_MAX_WORDS: null            # cap the A2 relator-prefix pool (only used when FAMILIES has A2)
A2_DROP_LEN1: false

PAIR_LIMIT: 40                # rank 4: cap C(pool,2)=120 pairs to 40 (even spacing). A "limit"
                              # -> OUT of the filename; raising it re-runs only newly admitted sets.
TRIPLE_LIMIT: 20              # rank 5: cap C(pool,3)=560 triples to 20 (even spacing).
ALLOW_CHAINED_WORDS: false    # false -> every w_i in F(x,y); result-neutral with A1/A2 pools

RESUME: true                  # skip (name, z_words) jobs already in the jsonl
PATH_IN_SEPARATE_FILE: true   # solved paths (moves only) -> *_paths.jsonl
ROW_LIMIT: null               # first N benchmark rows only (smoke runs)
WORDSET_LIMIT: null           # first N word-sets per row only (smoke runs)
NAMES: null                   # run only these row names, e.g. ["AK(3)", "ms499"]

LOCAL_OUT_DIR: results/stable_ac/static_rank                                # when MOUNT_DRIVE is false
DRIVE_OUT_DIR: /content/drive/MyDrive/acsolverx_results/stable_ac/static_rank   # when true (Colab)
MOUNT_DRIVE: true             # Colab default; DEFAULT_CONFIG (local) is false
PROGRESS_EVERY: 25            # print one status line every N jobs

USE_WANDB: true               # Colab default; DEFAULT_CONFIG (local) is false
WANDB_ENTITY: avigyapaudel045-aisc
WANDB_PROJECT: acsolver
WANDB_JOB_TYPE: stable_ac_static_rank
WANDB_GROUP: null             # null -> "combined_11-staticrank-r{rank}-mrl64-cyc"
WANDB_RUN_NAME: null          # null -> readable derived name, e.g. "A1 · r4 · 10000 · combined_11 · static_rank"
WANDB_TAGS: null
WANDB_NOTES: null
WANDB_MODE: online            # "offline" for a flaky network -> wandb sync later
