# Step 4 Branch B — one-shot change of variables (case i).
# Loaded by run_cov.py over its COV_DEFAULTS; every knob here is reviewable.

datasets:                       # benchmark halves (Steps 2/2b). Subsets regenerated
                                # 2026-07-15: minimally-automorphic picks (Aut-class dedup);
                                # sweep rows from the old picks stay in the jsonls as dead rows
  - results/benchmark/subsets/benchmark_subset_10.csv
  - results/benchmark/reach/reach_tier_1.csv

budgets: [100, 1000]            # local verification ceiling is 1000 (repo hard rule);
                                # production budgets (e.g. 50000) are the user's, on Colab

mode: cov                       # cov | baseline (identity transform, same rows/budgets,
                                # for a same-budget comparison file)

# z_family (the NAIVE_Z_FAMILY tag, part of the filename identity) is deliberately
# NOT a yaml knob: it lives only in cov.Z_FAMILY_TAG. A yaml copy shadowed the
# zf1->zf2->zf3 bumps — an identity tag has exactly one source of truth.
# zf3 = zf2 word list + cyclic-seam matches in substitute_word.

max_relator_length: 24          # base per-relator cap (ms640 layout). A cov row runs at
                                # max(this, longest transformed relator + cap_headroom),
                                # recorded per row as max_relator_length_cap
cap_headroom: 16                # slack above the longest transformed relator — a relator
                                # pinned at the cap can never lengthen over the hump
reject_len: 239                 # structural ceiling only (fast-solver relator cap 255
                                # minus cap_headroom) — NOT a length prior; long starts
                                # sometimes hold the only solve (629, 539). Family-rule
                                # knob: changing it requires a sweep-tag bump.

experiment_length: false        # true = the length experiment: per presentation run the
                                # greedy from EVERY valid subword-derived CoV plus one
                                # no-CoV control row (z_word null). Rows keyed
                                # (pres_id, z_word, iso_gen, iso_index); prefix covsweep_..._subnc2pxysb_.
                                # Answers: does post-CoV start length predict outcome?

# The subword family has NO length knob. z candidates = ALL cyclic subwords of the
# relators at EVERY length (w ~ w⁻¹ deduped, pure powers included), gated only by
# no-collapse: a z that substitutes some relator down to < cov.MIN_TRANSFORMED_LEN
# letters is dropped, because a relator collapsed to length 2 is the two-letter
# isolator the factorization theorem proves is ordinary AC + a rename. So the family
# is a pure function of the presentation. The old `subword_max_len: 4` was a fixed
# global K and is GONE — not renamed; setting it here does nothing. Family tag lives
# ONLY in cov.SUBWORD_FAMILY_TAG — never mirror it here.
z_source: subwords              # subwords = z from the relators themselves (above);
                                # universe = every reduced (x,y)-word of length
                                # 2..universe_max_len, with defining-relator isolation
                                # allowed, so z need NOT occur in the presentation
                                # (elementary Nielsen re-coordinatisations, x- and
                                # y-eliminating). Sweep only; filename identity
                                # uni{universe_max_len}xys.
universe_max_len: 4             # length bound for the universe family (78 canonical
                                # words at 4; grows ~3x per +1)

cyclic_reduce: true
high_speedup: true              # production delta: run_baseline's compact fast solver —
                                # same pop order, every written row identical (a solved
                                # search is re-solved by the normal solver to recover its
                                # path). Result-neutral -> NOT in the filename identity;
                                # files written in either mode resume each other.
out_dir: results/stable_ac/cov  # new namespace — never greedy_baseline/ or benchmark/
resume: true

use_chunks: false               # true = stride-split the presentations into `chunks`
                                # chunks (row j -> chunk j%N+1, so the difficulty
                                # ladder spreads evenly); each chunk writes its own
                                # …_c{i}of{N}_… jsonl — the chunk IS resume identity.
chunks: 3                       # how many chunks
chunk_index: null               # 1..chunks = run only that chunk (one per parallel
                                # Colab session); null = run ALL chunks as parallel
                                # spawned processes in THIS session (high-RAM/multi-
                                # vCPU runtime). After every chunk completes,
                                # merge_chunks() (or --merge-chunks) concatenates
                                # them into the canonical unchunked file, which
                                # unchunked runs then resume seamlessly.
chunk_procs: 0                  # workers per single-chunk session (chunk_index = i):
                                # the chunk fans out over this many spawned processes
                                # — its nested fine chunks of the chunks*chunk_procs
                                # stride partition — and every row folds back into
                                # the one c{i}of{N} file at the end, so resume and
                                # merge_chunks are unchanged. 0 = auto (all CPU
                                # cores); 1 = serial. Result-neutral -> NOT in the
                                # filename identity.
