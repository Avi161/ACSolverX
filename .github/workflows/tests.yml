name: tests

# Minimal CI gate for main: runs the root tests/ suite (pytest.ini testpaths).
# main's tests are stdlib-only, so no requirements.txt install is needed.
# Enable as a required status check in the main ruleset once one run exists.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: pytest
